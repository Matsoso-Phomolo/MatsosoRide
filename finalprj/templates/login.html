{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block topbar %}
<div class="topbar">
  <a href="/" class="t-back">← Back</a>
  <span class="t-title" style="text-align:center">Login</span>
  <span style="width:64px"></span>
</div>
{% endblock %}
{% block content %}
<div class="fp">
  <div style="text-align:center;padding:8px 0 20px">
    <div style="font-size:40px;margin-bottom:8px">🔑</div>
    <h1 style="font-size:20px;font-weight:700">Staff Login</h1>
    <p style="font-size:12.5px;color:var(--tx3);margin-top:4px">Drivers and administrators only</p>
  </div>

  <form id="loginForm" method="POST" action="/login">
    <input type="hidden" name="role" id="role-inp" value="{{ role }}">

    <div class="fc">
      <div class="fs">Select your role</div>
      <div class="rtabs">
        <div class="rtab {% if role=='driver' %}on{% endif %}" data-role="driver">
          <span class="ri">🚗</span>Driver
        </div>
        <div class="rtab {% if role=='admin' %}on{% endif %}" data-role="admin">
          <span class="ri">🔑</span>Admin
        </div>
      </div>
    </div>

    <div class="fc">
      <div class="fs">Credentials</div>
      <div class="fld">
        <div class="lbl">Phone / Username <span class="req">*</span></div>
        <div class="iw">
          <span class="ico">📱</span>
          <input class="inp" type="text" name="identifier" id="identifier"
                 value="{{ ident }}" placeholder="+26658XXXXXX or username"
                 data-rule="required" data-mask="phone" autocomplete="username" required>
        </div>
        <span class="ferr" id="identifier_err"></span>
      </div>
      <div class="fld">
        <div class="lbl">Password <span class="req">*</span></div>
        <div class="pw">
          <input class="inp" type="password" name="password" id="password"
                 placeholder="Your password" data-rule="required"
                 autocomplete="current-password" required>
          <button type="button" class="pw-btn" onclick="togglePw('password',this)">👁</button>
        </div>
      </div>
      <button class="btn btn-primary btn-full" type="submit" style="margin-top:4px">Sign In</button>
    </div>
  </form>

  
</div>

<script>
function fill(role, ident, pw) {
  document.querySelectorAll('.rtab').forEach(t=>t.classList.remove('on'));
  document.querySelector(`.rtab[data-role="${role}"]`).classList.add('on');
  document.getElementById('role-inp').value = role;
  document.getElementById('identifier').value = ident;
  document.getElementById('password').value = pw;
  if(role==='admin') {
    document.getElementById('identifier').removeAttribute('data-mask');
  }
  toast('✓ Demo credentials filled');
}
document.querySelectorAll('.rtab[data-role]').forEach(tab => {
  tab.addEventListener('click', function() {
    const role = this.dataset.role;
    const inp = document.getElementById('identifier');
    const roleInp = document.getElementById('role-inp');
    
    roleInp.value = role;

    if (role === 'admin') {
      // Force remove attributes and clear any masking classes
      inp.removeAttribute('data-mask');
      inp.type = "text"; 
      inp.placeholder = 'Username or email';
      // If using a library like IMask, you might need: 
      // if(window.phoneMask) window.phoneMask.destroy();
    } else {
      inp.setAttribute('data-mask', 'phone');
      inp.placeholder = '+266 5820 0001';
    }
  });
});
</script>
{% endblock %}
